<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Settlers App</title>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>

<style>
    body {
        font-family: system-ui, sans-serif;
        padding: 20px;
    }

    table {
        border-collapse: collapse;
    }

    th,
    td {
        padding: 4px;
        text-align: center;
        font-size: 13px;
    }

    th {
        font-weight: 600;
        color: #555;
    }
    th.day {
    width: 14px;
    height: 20px;
    padding: 0;
    font-size: 9px;
    line-height: 1;
    vertical-align: middle;
    }

    .th-date {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    }
    .user {
        text-align: right;
        padding-right: 10px;
        white-space: nowrap;
    }

    .cell {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        background: #b0b0b0;
    }

    td.empty-day {
        background: #b0b0b0;
    }

    .cell.online {
        background: #40c463;
    }

    .cell.offline {
        background: #e5533d;
    }

    .cell:hover {
        outline: 1px solid #555;
        cursor: pointer;
    }

    .percentage {
        margin-left: 6px;
        font-size: 0.85em;
        color: #777;
    }
</style>



<script>
$(document).ready(function(){


    function getActivityPercentage(activity, days) {
        let online = 0;
        let total = 0;

        days.forEach(day => {
            if (!activity[day]) return; // ignore missing days

            total++;
            if (activity[day].online24h) {
                online++;
            }
        });

        return total === 0 ? 0 : Math.round((online / total) * 100);
    }

    fetch("/api/guild-user-summary", {method: "GET"})
    .then(res => {
        if (!res.ok) throw Error(res.statusText);
        return res.json();
    })
    .then(data => {
        const allDates = [...new Set(
            Object.values(data).flatMap(user => Object.keys(user))
        )].sort();

        const minDate = new Date(allDates[0]);
        const maxDate = new Date(allDates[allDates.length - 1]);

        const days = [];
        let current = new Date(maxDate);

        while (current >= minDate) {
            const y = current.getFullYear();
            const m = String(current.getMonth() + 1).padStart(2, '0');
            const d = String(current.getDate()).padStart(2, '0');

            days.push(`${y}-${m}-${d}`);

            current.setDate(current.getDate() - 1);
        }

        const table = document.getElementById('activity');

        const header = document.createElement('tr');
        header.innerHTML =
        `<th></th>` +
        days.map(d => {
            const [, month, day] = d.split('-');
            return `
            <th class="day" title="${d}">
                <div class="th-date">
                <div>${day}</div>
                <div>${month}</div>
                </div>
            </th>
            `;
        }).join('');
        table.appendChild(header);


        const lastDay = days[0];

        const users = Object.entries(data)
        .map(([user, activity]) => ({
            user,
            activity,
            percentage: getActivityPercentage(activity, days),
            active: !!activity[lastDay] // true if present on last day
        }))
        .sort((a, b) => a.percentage - b.percentage);

        const activeUsers = users.filter(u => u.active);
        const formerUsers = users.filter(u => !u.active);

        function renderRows(list, title) {

            const sectionHeader = document.createElement('tr');
            sectionHeader.innerHTML = `
                <td colspan="${days.length + 1}" style="text-align:left;font-weight:bold;padding-top:10px">
                    ${title}
                </td>`;
            if (title !== "") table.appendChild(sectionHeader);

            list.forEach(({ user, activity, percentage }) => {

                const row = document.createElement('tr');

                row.innerHTML = `
                    <td class="user">
                        ${user}
                        <span class="percentage">${percentage}%</span>
                    </td>
                ` +
                days.map(day => {

                    const entry = activity[day];

                    const isEmptyDay = !Object.values(data).some(user => user[day]);

                    if (!entry) {
                        return `
                            <td class="${isEmptyDay ? 'empty-day' : ''}">
                                <div class="cell" title="${user} • ${day} • no data"></div>
                            </td>`;
                    }

                    return `
                        <td class="${isEmptyDay ? 'empty-day' : ''}">
                            <div
                                class="cell ${entry.online24h ? 'online' : 'offline'}"
                                title="${user} • ${day} • ${entry.online24h ? 'online' : 'offline'}"
                            ></div>
                        </td>`;
                }).join('');

                table.appendChild(row);
            });
        }

        renderRows(activeUsers, "");
        renderRows(formerUsers, "Players no longer in guild");

    })
    .catch(error => console.log(error));
})
 

</script>
</head>
<body>
    <h3>Guild members activity list</h3>
    <table id="activity"></table> 
</body>
</html>
